<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HTTP Status Checker · Out Limit</title>
  <link rel="icon" type="image/png" href="https://outlimit.com.br/wp-content/uploads/2026/03/cropped-favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* ── Design Tokens (Out Limit) ── */
    :root {
      --bg:            #F9F8F5;
      --surface:       #FFFFFF;
      --text-primary:  #252E3D;
      --text-secondary:#737373;
      --text-muted:    #B0B0B0;
      --accent:        #3F42E0;
      --accent-light:  #E7E6FA;
      --accent-mid:    #605DB9;
      --border:        rgba(37,46,61,0.09);
      --border-strong: rgba(37,46,61,0.18);
      --shadow:        0 1px 3px rgba(37,46,61,0.07), 0 8px 28px rgba(37,46,61,0.05);
      --r-pill: 50px; --r-card: 12px;
      --s2-color: #1ABD4B; --s2-bg: #EDFBF2;
      --s3-color: #3F78E0; --s3-bg: #EBF2FD;
      --s4-color: #E07A3F; --s4-bg: #FDF3EB;
      --s5-color: #E03F3F; --s5-bg: #FDEBED;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Geist', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg); color: var(--text-primary);
      min-height: 100vh; display: flex; flex-direction: column;
    }

    /* ── Nav ── */
    nav {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      box-shadow: 0 1px 0 var(--border), 0 4px 16px rgba(37,46,61,0.04);
      padding: 0 40px; height: 64px;
      display: flex; align-items: center; gap: 0;
    }
    .logo { display: flex; align-items: center; text-decoration: none; color: var(--text-primary); flex-shrink: 0; }
    .logo img { height: 32px; width: auto; display: block; mix-blend-mode: multiply; }
    .logo-divider { width: 1px; height: 18px; background: var(--border-strong); margin: 0 16px; flex-shrink: 0; }
    .nav-badge {
      display: inline-flex; align-items: center;
      background: var(--accent-light); color: var(--accent);
      font-size: 12px; font-weight: 600; letter-spacing: 0.01em;
      padding: 4px 12px; border-radius: var(--r-pill);
      white-space: nowrap;
    }
    .nav-spacer { flex: 1; }
    .nav-cta {
      display: inline-flex; align-items: center; gap: 7px;
      background: var(--text-primary); color: #fff;
      font-family: inherit; font-size: 13px; font-weight: 500;
      padding: 9px 20px; border-radius: var(--r-pill);
      text-decoration: none; border: none; cursor: pointer;
      transition: opacity .15s;
      white-space: nowrap; flex-shrink: 0;
    }
    .nav-cta:hover { opacity: 0.85; }
    .nav-cta svg { flex-shrink: 0; }

    /* ── Hero ── */
    .hero {
      padding: 64px 24px 44px; text-align: center; position: relative;
    }
    .hero::before {
      content: '';
      position: absolute; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg width='1200' height='400' viewBox='0 0 1200 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 200 Q300 120 600 200 T1200 200' fill='none' stroke='%23252E3D' stroke-width='1' opacity='0.04'/%3E%3Cpath d='M0 260 Q300 180 600 260 T1200 260' fill='none' stroke='%23252E3D' stroke-width='1' opacity='0.03'/%3E%3Cpath d='M0 140 Q300 60 600 140 T1200 140' fill='none' stroke='%23252E3D' stroke-width='1' opacity='0.03'/%3E%3C/svg%3E");
      background-repeat: no-repeat; background-size: cover; pointer-events: none;
    }
    .hero > * { position: relative; }
    .badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--accent-light); color: var(--accent);
      font-size: 12px; font-weight: 500; padding: 5px 14px;
      border-radius: var(--r-pill); margin-bottom: 20px;
    }
    .hero h1 {
      font-size: 44px; font-weight: 700; line-height: 1.1;
      letter-spacing: -0.025em; margin-bottom: 12px;
      max-width: 560px; margin-left: auto; margin-right: auto;
    }
    .hero p {
      font-size: 16px; color: var(--text-secondary); line-height: 1.65;
      max-width: 420px; margin: 0 auto 32px;
    }

    /* ── Mode toggle ── */
    .mode-toggle {
      display: inline-flex;
      background: var(--surface);
      border: 1.5px solid var(--border-strong);
      border-radius: var(--r-pill);
      padding: 4px;
      margin-bottom: 20px;
      box-shadow: var(--shadow);
    }
    .mode-btn {
      padding: 8px 22px; border-radius: 50px; border: none; cursor: pointer;
      font-family: inherit; font-size: 13px; font-weight: 500;
      background: transparent; color: var(--text-secondary);
      transition: background .15s, color .15s;
    }
    .mode-btn.active { background: var(--text-primary); color: #fff; }

    /* ── Single mode ── */
    .search-wrap { max-width: 660px; margin: 0 auto; }
    .search-bar {
      display: flex; align-items: center; gap: 8px;
      background: var(--surface); border: 1.5px solid var(--border-strong);
      border-radius: var(--r-pill); padding: 6px 6px 6px 22px;
      box-shadow: var(--shadow); transition: border-color .2s, box-shadow .2s;
    }
    .search-bar:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(63,66,224,.1), var(--shadow);
    }
    .search-bar input {
      flex: 1; border: none; outline: none; font-family: inherit;
      font-size: 14.5px; color: var(--text-primary); background: transparent; min-width: 0;
    }
    .search-bar input::placeholder { color: var(--text-muted); }
    .chips { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-top: 14px; }
    .chip {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--r-pill); padding: 5px 14px;
      font-size: 12px; color: var(--text-secondary); cursor: pointer;
      transition: border-color .2s, color .2s;
    }
    .chip:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Bulk mode ── */
    .bulk-wrap { max-width: 660px; margin: 0 auto; }
    .bulk-textarea {
      width: 100%; min-height: 160px; padding: 16px 20px;
      font-family: inherit; font-size: 13.5px; color: var(--text-primary);
      background: var(--surface); border: 1.5px solid var(--border-strong);
      border-radius: 16px; resize: vertical; outline: none;
      box-shadow: var(--shadow); line-height: 1.7;
      transition: border-color .2s, box-shadow .2s;
    }
    .bulk-textarea::placeholder { color: var(--text-muted); }
    .bulk-textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(63,66,224,.1), var(--shadow);
    }
    .bulk-controls {
      display: flex; align-items: center; justify-content: space-between;
      margin-top: 10px; flex-wrap: wrap; gap: 10px;
    }
    .bulk-hint { font-size: 12px; color: var(--text-muted); }
    .bulk-hint span { color: var(--text-secondary); font-weight: 500; }
    .concurrency-label { font-size: 12px; color: var(--text-secondary); display: flex; align-items: center; gap: 8px; }
    .concurrency-select {
      font-family: inherit; font-size: 12px; color: var(--text-primary);
      background: var(--surface); border: 1px solid var(--border-strong);
      border-radius: 8px; padding: 4px 8px; cursor: pointer;
    }

    /* ── Shared button ── */
    .btn-primary {
      background: var(--text-primary); color: #fff; border: none;
      border-radius: var(--r-pill); padding: 11px 26px;
      font-family: inherit; font-size: 13.5px; font-weight: 500;
      cursor: pointer; transition: background .15s, transform .1s; white-space: nowrap;
    }
    .btn-primary:hover  { background: #1c2433; }
    .btn-primary:active { transform: scale(.98); }
    .btn-primary:disabled { opacity: .55; cursor: not-allowed; transform: none; }
    .btn-secondary {
      background: var(--surface); color: var(--text-primary);
      border: 1.5px solid var(--border-strong);
      border-radius: var(--r-pill); padding: 10px 22px;
      font-family: inherit; font-size: 13px; font-weight: 500;
      cursor: pointer; transition: background .15s; white-space: nowrap;
    }
    .btn-secondary:hover { background: var(--bg); }

    /* ── Results (single) ── */
    .results { flex: 1; max-width: 720px; width: 100%; margin: 0 auto; padding: 0 24px 72px; }

    /* loading */
    .loading {
      display: flex; align-items: center; justify-content: center;
      gap: 12px; padding: 72px 0; color: var(--text-secondary); font-size: 14px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 20px; height: 20px;
      border: 2px solid var(--border); border-top-color: var(--accent);
      border-radius: 50%; animation: spin .75s linear infinite; flex-shrink: 0;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* single result card */
    .result-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--r-card); box-shadow: var(--shadow);
      overflow: hidden; margin-top: 32px; animation: fadeUp .25s ease;
    }
    .card-status {
      padding: 24px 26px; display: flex; align-items: center;
      gap: 20px; border-bottom: 1px solid var(--border);
    }
    .big-code { font-size: 52px; font-weight: 700; line-height: 1; letter-spacing: -0.025em; flex-shrink: 0; }
    .status-meta { flex: 1; min-width: 0; }
    .status-label { font-size: 18px; font-weight: 600; color: var(--text-primary); }
    .status-url { font-size: 13px; color: var(--text-secondary); margin-top: 3px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .status-pill { flex-shrink: 0; padding: 4px 13px; border-radius: var(--r-pill); font-size: 11.5px; font-weight: 600; letter-spacing: .04em; }
    .card-metrics { display: flex; padding: 18px 26px; border-bottom: 1px solid var(--border); overflow-x: auto; }
    .metric { display: flex; flex-direction: column; gap: 3px; padding-right: 32px; border-right: 1px solid var(--border); margin-right: 32px; }
    .metric:last-child { border-right: none; margin-right: 0; padding-right: 0; }
    .metric-label { font-size: 10.5px; font-weight: 500; text-transform: uppercase; letter-spacing: .06em; color: var(--text-muted); }
    .metric-value { font-size: 15px; font-weight: 600; color: var(--text-primary); white-space: nowrap; }
    .card-headers { padding: 20px 26px; }
    .section-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .07em; color: var(--text-muted); margin-bottom: 14px; }
    .header-row { display: flex; gap: 14px; padding: 9px 0; border-bottom: 1px solid var(--border); font-size: 13px; line-height: 1.4; }
    .header-row:last-child { border-bottom: none; }
    .header-key { font-weight: 500; color: var(--accent-mid); min-width: 160px; flex-shrink: 0; }
    .header-val { color: var(--text-secondary); word-break: break-all; }

    /* cors / error cards */
    .cors-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--r-card); box-shadow: var(--shadow);
      overflow: hidden; margin-top: 32px; animation: fadeUp .25s ease;
    }
    .cors-header { padding: 24px 26px; display: flex; align-items: center; gap: 20px; border-bottom: 1px solid var(--border); }
    .cors-symbol { font-size: 52px; font-weight: 700; line-height: 1; color: var(--text-muted); flex-shrink: 0; letter-spacing: -0.025em; }
    .cors-notice {
      background: var(--accent-light); border-radius: var(--r-card);
      padding: 14px 18px; margin: 0 26px 20px;
      font-size: 13px; color: var(--accent-mid); line-height: 1.5;
    }
    .cors-notice strong { font-weight: 600; color: var(--accent); }
    .error-card {
      background: var(--s5-bg); border: 1px solid rgba(224,63,63,0.2);
      border-radius: var(--r-card); padding: 22px 26px;
      margin-top: 32px; display: flex; gap: 14px; animation: fadeUp .25s ease;
    }
    .error-icon { font-size: 22px; flex-shrink: 0; line-height: 1; }
    .error-title { font-size: 15px; font-weight: 600; color: var(--s5-color); margin-bottom: 4px; }
    .error-desc { font-size: 13px; color: #9B3A3A; line-height: 1.5; }

    /* ── Bulk results ── */
    .bulk-results-wrap { max-width: 960px; width: 100%; margin: 0 auto; padding: 0 24px 72px; }

    /* progress */
    .progress-bar-wrap {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--r-card); padding: 20px 24px;
      margin-top: 28px; box-shadow: var(--shadow); animation: fadeUp .2s ease;
    }
    .progress-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .progress-label { font-size: 13px; font-weight: 500; color: var(--text-primary); }
    .progress-count { font-size: 13px; color: var(--text-secondary); }
    .progress-track { height: 6px; background: var(--border); border-radius: 99px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--accent); border-radius: 99px; transition: width .2s; }
    .progress-stats { display: flex; gap: 20px; margin-top: 12px; flex-wrap: wrap; }
    .pstat { font-size: 12px; display: flex; align-items: center; gap: 5px; }
    .pstat-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

    /* table toolbar */
    .table-toolbar {
      display: flex; align-items: center; justify-content: space-between;
      margin-top: 20px; flex-wrap: wrap; gap: 10px;
    }
    .table-summary { font-size: 13px; color: var(--text-secondary); }
    .table-summary strong { color: var(--text-primary); font-weight: 600; }
    .toolbar-right { display: flex; gap: 8px; }

    /* filter chips */
    .filter-chips { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
    .fchip {
      padding: 4px 12px; border-radius: var(--r-pill);
      font-size: 11.5px; font-weight: 500; cursor: pointer;
      border: 1.5px solid transparent; transition: opacity .15s, border-color .15s;
    }
    .fchip.inactive { opacity: .45; }

    /* table */
    .table-wrap {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--r-card); box-shadow: var(--shadow);
      overflow: hidden; margin-top: 12px; animation: fadeUp .25s ease;
    }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    thead { background: var(--bg); }
    th {
      padding: 11px 16px; text-align: left; font-size: 10.5px; font-weight: 600;
      text-transform: uppercase; letter-spacing: .06em; color: var(--text-muted);
      border-bottom: 1px solid var(--border); white-space: nowrap; cursor: pointer;
      user-select: none;
    }
    th:hover { color: var(--text-secondary); }
    th .sort-arrow { margin-left: 4px; opacity: .4; }
    th.sorted .sort-arrow { opacity: 1; color: var(--accent); }
    td { padding: 11px 16px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(63,66,224,.025); }

    .td-url {
      max-width: 340px; overflow: hidden; text-overflow: ellipsis;
      white-space: nowrap; color: var(--text-primary); font-weight: 450;
    }
    .td-url a { color: inherit; text-decoration: none; }
    .td-url a:hover { text-decoration: underline; color: var(--accent); }
    .td-code { font-weight: 700; font-size: 14px; }
    .td-text { color: var(--text-secondary); }
    .td-time { color: var(--text-secondary); white-space: nowrap; }
    .td-via { }
    .via-badge {
      display: inline-block; padding: 2px 8px; border-radius: 99px;
      font-size: 10.5px; font-weight: 500;
    }
    .via-direct { background: var(--s2-bg); color: var(--s2-color); }
    .via-cors   { background: var(--accent-light); color: var(--accent-mid); }
    .via-err    { background: var(--s5-bg); color: var(--s5-color); }
    .row-spin { width: 14px; height: 14px; border: 1.5px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; display: inline-block; vertical-align: middle; }

    /* colour helpers */
    .c2 { color: var(--s2-color); } .c3 { color: var(--s3-color); } .c4 { color: var(--s4-color); } .c5 { color: var(--s5-color); } .cm { color: var(--text-muted); }
    .p2 { background: var(--s2-bg); color: var(--s2-color); } .p3 { background: var(--s3-bg); color: var(--s3-color); } .p4 { background: var(--s4-bg); color: var(--s4-color); } .p5 { background: var(--s5-bg); color: var(--s5-color); }

    /* ── Footer ── */
    footer {
      padding: 18px 24px; text-align: center; font-size: 12px;
      color: var(--text-muted); border-top: 1px solid var(--border);
      background: var(--surface); margin-top: auto;
    }
    footer a { color: var(--accent); text-decoration: none; }

    /* ── Responsive ── */
    @media (max-width: 640px) {
      nav { padding: 0 20px; }
      .hero { padding: 48px 20px 36px; }
      .hero h1 { font-size: 30px; }
      .results, .bulk-results-wrap { padding: 0 16px 52px; }
      .big-code { font-size: 40px; }
      .card-status { flex-wrap: wrap; }
      th:nth-child(4), td:nth-child(4),
      th:nth-child(5), td:nth-child(5) { display: none; }
    }
  </style>
</head>
<body>

<nav>
  <a href="https://outlimit.com.br" target="_blank" class="logo">
    <img src="https://outlimit.com.br/wp-content/uploads/2026/03/logo-out-limit-creative-light.png" alt="Out Limit" />
  </a>
  <div class="logo-divider"></div>
  <span class="nav-badge">HTTP Status Checker</span>
  <div class="nav-spacer"></div>
  <a href="https://outlimit.com.br" target="_blank" class="nav-cta">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
    </svg>
    Falar com especialista
  </a>
</nav>

<section class="hero">
  <div class="badge">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>
    Verificação instantânea
  </div>
  <h1>HTTP Status Checker</h1>
  <p>Verifique o status de uma URL ou centenas de uma vez.</p>

  <!-- Mode toggle -->
  <div class="mode-toggle">
    <button class="mode-btn active" id="btnSingle" onclick="setMode('single')">URL única</button>
    <button class="mode-btn" id="btnBulk"   onclick="setMode('bulk')">Em lote</button>
  </div>

  <!-- Single mode -->
  <div id="modeSingle" class="search-wrap">
    <div class="search-bar">
      <input id="urlInput" type="url" placeholder="https://exemplo.com" autocomplete="off" autocapitalize="off" spellcheck="false" />
      <button class="btn-primary" id="checkBtn">Verificar</button>
    </div>
    <div class="chips">
      <span class="chip" data-url="https://api.github.com/users/github">API GitHub 200</span>
      <span class="chip" data-url="https://httpbin.org/status/404">404 Not Found</span>
      <span class="chip" data-url="https://httpbin.org/status/500">500 Error</span>
      <span class="chip" data-url="https://google.com">google.com</span>
      <span class="chip" data-url="https://httpbin.org/redirect/3">Redirect Chain</span>
    </div>
  </div>

  <!-- Bulk mode -->
  <div id="modeBulk" class="bulk-wrap" style="display:none">
    <textarea id="bulkInput" class="bulk-textarea"
      placeholder="Cole as URLs aqui, uma por linha:&#10;https://meusite.com&#10;https://meusite.com/sobre&#10;https://api.meusite.com/health&#10;..."></textarea>
    <div class="bulk-controls">
      <span class="bulk-hint" id="bulkHint">0 URLs detectadas</span>
      <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
        <label class="concurrency-label">
          Paralelas:
          <select class="concurrency-select" id="concurrencySelect">
            <option value="5">5</option>
            <option value="10" selected>10</option>
            <option value="20">20</option>
            <option value="50">50</option>
          </select>
        </label>
        <button class="btn-primary" id="bulkBtn">Verificar todas</button>
      </div>
    </div>
  </div>
</section>

<!-- Single results -->
<div class="results" id="singleResults"></div>

<!-- Bulk results -->
<div class="bulk-results-wrap" id="bulkResults" style="display:none"></div>

<footer>
  Feito com 💙 pela <a href="https://outlimit.com.br" target="_blank">Out Limit</a>
</footer>

<script>
  // ── Status catalogue ──
  var STATUS = {
    100:'Continue',101:'Switching Protocols',102:'Processing',103:'Early Hints',
    200:'OK',201:'Created',202:'Accepted',203:'Non-Authoritative Information',
    204:'No Content',205:'Reset Content',206:'Partial Content',207:'Multi-Status',
    301:'Moved Permanently',302:'Found',303:'See Other',304:'Not Modified',
    307:'Temporary Redirect',308:'Permanent Redirect',
    400:'Bad Request',401:'Unauthorized',402:'Payment Required',403:'Forbidden',
    404:'Not Found',405:'Method Not Allowed',406:'Not Acceptable',
    408:'Request Timeout',409:'Conflict',410:'Gone',411:'Length Required',
    413:'Payload Too Large',414:'URI Too Long',415:'Unsupported Media Type',
    418:"I'm a Teapot",422:'Unprocessable Entity',423:'Locked',425:'Too Early',
    429:'Too Many Requests',451:'Unavailable for Legal Reasons',
    500:'Internal Server Error',501:'Not Implemented',502:'Bad Gateway',
    503:'Service Unavailable',504:'Gateway Timeout',
    507:'Insufficient Storage',511:'Network Authentication Required',
  };

  // ── Helpers ──
  function cls(code) {
    if (code >= 200 && code < 300) return '2';
    if (code >= 300 && code < 400) return '3';
    if (code >= 400 && code < 500) return '4';
    if (code >= 500) return '5';
    return '5';
  }
  function icon(code) { return {'2':'✓','3':'↪','4':'⚠','5':'✗'}[cls(code)] || '?'; }
  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function fmtTime(ms) { return ms < 1000 ? ms + ' ms' : (ms/1000).toFixed(2) + ' s'; }
  function ensureProtocol(url) { return /^https?:\/\//i.test(url) ? url : 'https://' + url; }
  function hostname(url) { try { return new URL(url).hostname; } catch(e) { return url; } }

  // ── Mode toggle ──
  var currentMode = 'single';
  function setMode(m) {
    currentMode = m;
    document.getElementById('modeSingle').style.display = m === 'single' ? '' : 'none';
    document.getElementById('modeBulk').style.display   = m === 'bulk'   ? '' : 'none';
    document.getElementById('singleResults').style.display = m === 'single' ? '' : 'none';
    document.getElementById('bulkResults').style.display   = m === 'bulk'   ? '' : 'none';
    document.getElementById('btnSingle').classList.toggle('active', m === 'single');
    document.getElementById('btnBulk').classList.toggle('active', m === 'bulk');
  }

  // ── Fetch core (shared) ──
  function fetchWithCors(url) {
    return fetch(url, { mode: 'cors', redirect: 'follow', signal: AbortSignal.timeout(12000) })
      .then(function(res) {
        return {
          ok: true, mode: 'direct', code: res.status,
          contentType: res.headers.get('content-type') || '',
          server:      res.headers.get('server') || '',
          cacheCtrl:   res.headers.get('cache-control') || '',
          finalUrl:    res.url || url,
        };
      });
  }

  function probeNoCors(url) {
    return fetch(url, { mode: 'no-cors', redirect: 'follow', signal: AbortSignal.timeout(12000) })
      .then(function() { return { ok: true, mode: 'no-cors' }; });
  }

  function checkOne(url) {
    var t0 = Date.now();
    return fetchWithCors(url)
      .catch(function(e) {
        if (e.name === 'AbortError' || e.name === 'TimeoutError') return { ok: false, error: 'timeout' };
        return probeNoCors(url)
          .then(function() { return { ok: true, mode: 'no-cors' }; })
          .catch(function(e2) {
            if (e2.name === 'AbortError' || e2.name === 'TimeoutError') return { ok: false, error: 'timeout' };
            return { ok: false, error: 'unreachable' };
          });
      })
      .then(function(r) { r.elapsed = Date.now() - t0; r.url = url; return r; });
  }

  // ── Concurrency pool ──
  function poolRun(tasks, limit, onDone) {
    var idx = 0;
    var active = 0;
    var stopped = false;

    function next() {
      if (stopped || idx >= tasks.length) return;
      while (active < limit && idx < tasks.length) {
        (function(task) {
          active++;
          task().then(function(result) {
            active--;
            onDone(result);
            next();
          }).catch(function() {
            active--;
            next();
          });
        })(tasks[idx++]);
      }
    }

    next();
    return { stop: function() { stopped = true; } };
  }

  // ════════════════════════════════════════
  // ── SINGLE MODE ──
  // ════════════════════════════════════════
  function runSingle() {
    var raw = document.getElementById('urlInput').value.trim();
    if (!raw) return;
    raw = ensureProtocol(raw);
    document.getElementById('urlInput').value = raw;

    var btn = document.getElementById('checkBtn');
    btn.disabled = true; btn.textContent = 'Verificando…';

    document.getElementById('singleResults').innerHTML =
      '<div class="loading"><div class="spinner"></div><span>Consultando ' + esc(hostname(raw)) + '…</span></div>';

    checkOne(raw).then(function(r) {
      var protocol = raw.startsWith('https') ? 'HTTPS' : 'HTTP';
      if (!r.ok) {
        if (r.error === 'timeout') {
          showSingleError('Tempo esgotado (' + fmtTime(r.elapsed) + '). O servidor pode estar lento ou offline.');
        } else {
          showSingleError('Host inacessível. Verifique se a URL está correta e o servidor está online.');
        }
      } else if (r.mode === 'no-cors') {
        renderCorsBlocked(raw, r.elapsed, protocol);
      } else {
        renderSingleResult(r, protocol, raw);
      }
      btn.disabled = false; btn.textContent = 'Verificar';
    });
  }

  function showSingleError(msg) {
    document.getElementById('singleResults').innerHTML =
      '<div class="error-card"><div class="error-icon">⚠️</div><div>' +
      '<div class="error-title">Não foi possível verificar</div>' +
      '<div class="error-desc">' + esc(msg) + '</div></div></div>';
  }

  function renderSingleResult(r, protocol, originalUrl) {
    var redirected = r.finalUrl && r.finalUrl !== originalUrl;
    var displayUrl = redirected ? r.finalUrl : originalUrl;
    var c = cls(r.code);
    var label = STATUS[r.code] || 'Status desconhecido';
    var rows = [];
    if (r.contentType) rows.push(['content-type', r.contentType]);
    if (r.server)      rows.push(['server', r.server]);
    if (r.cacheCtrl)   rows.push(['cache-control', r.cacheCtrl]);
    if (redirected)    rows.push(['location', r.finalUrl]);
    rows.push(['x-protocol', protocol]);
    rows.push(['x-response-time', fmtTime(r.elapsed)]);

    var rowsHtml = rows.map(function(p) {
      return '<div class="header-row"><span class="header-key">' + esc(p[0]) +
             '</span><span class="header-val">' + esc(p[1]) + '</span></div>';
    }).join('');

    document.getElementById('singleResults').innerHTML =
      '<div class="result-card">' +
        '<div class="card-status">' +
          '<div class="big-code c' + c + '">' + r.code + '</div>' +
          '<div class="status-meta">' +
            '<div class="status-label">' + icon(r.code) + ' ' + esc(label) + '</div>' +
            '<div class="status-url" title="' + esc(displayUrl) + '">' + esc(displayUrl) + '</div>' +
          '</div>' +
          '<div class="status-pill p' + c + '">' + c + 'xx</div>' +
        '</div>' +
        '<div class="card-metrics">' +
          '<div class="metric"><span class="metric-label">Tempo</span><span class="metric-value">' + fmtTime(r.elapsed) + '</span></div>' +
          '<div class="metric"><span class="metric-label">Content-Type</span><span class="metric-value">' + (r.contentType ? esc(r.contentType.split(';')[0]) : '—') + '</span></div>' +
          '<div class="metric"><span class="metric-label">Protocolo</span><span class="metric-value">' + protocol + '</span></div>' +
          '<div class="metric"><span class="metric-label">Redirecionado</span><span class="metric-value">' + (redirected ? 'Sim' : 'Não') + '</span></div>' +
        '</div>' +
        '<div class="card-headers"><div class="section-title">Detalhes da Resposta</div>' + rowsHtml + '</div>' +
      '</div>';
  }

  function renderCorsBlocked(url, elapsed, protocol) {
    document.getElementById('singleResults').innerHTML =
      '<div class="cors-card">' +
        '<div class="cors-header">' +
          '<div class="cors-symbol">~</div>' +
          '<div class="status-meta"><div class="status-label">Servidor acessível</div>' +
          '<div class="status-url" title="' + esc(url) + '">' + esc(url) + '</div></div>' +
          '<div class="status-pill" style="background:var(--accent-light);color:var(--accent-mid)">CORS</div>' +
        '</div>' +
        '<div class="card-metrics">' +
          '<div class="metric"><span class="metric-label">Tempo</span><span class="metric-value">' + fmtTime(elapsed) + '</span></div>' +
          '<div class="metric"><span class="metric-label">Protocolo</span><span class="metric-value">' + protocol + '</span></div>' +
          '<div class="metric"><span class="metric-label">Status HTTP</span><span class="metric-value">Indisponível</span></div>' +
        '</div>' +
        '<div class="cors-notice"><strong>Por que o status não aparece?</strong> O servidor respondeu, mas não permite ' +
        'leitura cross-origin (CORS). Isso é normal em sites comuns. O código HTTP exato fica visível para APIs REST ' +
        'com <code>Access-Control-Allow-Origin</code>.</div>' +
      '</div>';
  }

  // ════════════════════════════════════════
  // ── BULK MODE ──
  // ════════════════════════════════════════
  var bulkRunning = false;
  var bulkPool = null;
  var bulkRows = [];        // { url, status: 'pending'|'done', result }
  var sortCol  = null;
  var sortAsc  = true;
  var activeFilters = { '2':true, '3':true, '4':true, '5':true, 'cors':true, 'err':true };

  // Count valid URLs in textarea
  document.getElementById('bulkInput').addEventListener('input', function() {
    var urls = parseBulkUrls();
    document.getElementById('bulkHint').innerHTML =
      '<span>' + urls.length + ' URL' + (urls.length !== 1 ? 's' : '') + '</span> detectadas';
  });

  function parseBulkUrls() {
    return document.getElementById('bulkInput').value
      .split('\n')
      .map(function(l) { return l.trim(); })
      .filter(function(l) { return l.length > 3 && (l.startsWith('http') || l.indexOf('.') > -1); })
      .map(ensureProtocol)
      .filter(function(u, i, arr) { return arr.indexOf(u) === i; }); // dedupe
  }

  function runBulk() {
    if (bulkRunning) { stopBulk(); return; }

    var urls = parseBulkUrls();
    if (urls.length === 0) {
      document.getElementById('bulkResults').style.display = '';
      document.getElementById('bulkResults').innerHTML =
        '<div class="error-card" style="margin-top:24px"><div class="error-icon">⚠️</div>' +
        '<div><div class="error-title">Nenhuma URL encontrada</div>' +
        '<div class="error-desc">Cole pelo menos uma URL válida na caixa acima.</div></div></div>';
      return;
    }

    var concurrency = parseInt(document.getElementById('concurrencySelect').value, 10);
    bulkRunning = true;
    var btn = document.getElementById('bulkBtn');
    btn.textContent = 'Parar';

    bulkRows = urls.map(function(u) { return { url: u, status: 'pending', result: null }; });
    sortCol = null; sortAsc = true;

    document.getElementById('bulkResults').style.display = '';
    renderBulkProgress(0, urls.length, {});
    renderBulkTable();

    var stats = { '2':0, '3':0, '4':0, '5':0, cors:0, err:0 };
    var done = 0;

    var tasks = urls.map(function(url, i) {
      return function() {
        return checkOne(url).then(function(r) {
          var row = bulkRows[i];
          row.status = 'done';
          row.result = r;
          done++;

          // update stats
          if (!r.ok) {
            stats.err++;
          } else if (r.mode === 'no-cors') {
            stats.cors++;
          } else {
            var c = cls(r.code);
            if (stats[c] !== undefined) stats[c]++;
          }

          renderBulkProgress(done, urls.length, stats);
          updateTableRow(i);
          return r;
        });
      };
    });

    bulkPool = poolRun(tasks, concurrency, function() {});

    // When all done
    var checkDone = setInterval(function() {
      var allDone = bulkRows.every(function(r) { return r.status === 'done'; });
      if (allDone || !bulkRunning) {
        clearInterval(checkDone);
        finishBulk(done, urls.length, stats);
      }
    }, 200);
  }

  function stopBulk() {
    if (bulkPool) { bulkPool.stop(); bulkPool = null; }
    bulkRunning = false;
    document.getElementById('bulkBtn').textContent = 'Verificar todas';
    // mark remaining as aborted
    bulkRows.forEach(function(r) {
      if (r.status === 'pending') {
        r.status = 'done';
        r.result = { ok: false, error: 'stopped', elapsed: 0, url: r.url };
      }
    });
    renderBulkTable();
  }

  function finishBulk(done, total, stats) {
    bulkRunning = false;
    document.getElementById('bulkBtn').textContent = 'Verificar todas';
    renderBulkProgress(done, total, stats);
    renderBulkTable(); // re-render final state
  }

  // ── Progress bar ──
  function renderBulkProgress(done, total, stats) {
    var pct = total > 0 ? Math.round((done / total) * 100) : 0;
    var el = document.getElementById('bulkProgressWrap');
    if (!el) {
      document.getElementById('bulkResults').insertAdjacentHTML('afterbegin',
        '<div class="progress-bar-wrap" id="bulkProgressWrap">' +
          '<div class="progress-top">' +
            '<span class="progress-label" id="pLabel">Verificando…</span>' +
            '<span class="progress-count" id="pCount"></span>' +
          '</div>' +
          '<div class="progress-track"><div class="progress-fill" id="pFill" style="width:0%"></div></div>' +
          '<div class="progress-stats" id="pStats"></div>' +
        '</div>'
      );
    }

    document.getElementById('pLabel').textContent = done >= total ? 'Concluído' : 'Verificando…';
    document.getElementById('pCount').textContent = done + ' / ' + total;
    document.getElementById('pFill').style.width = pct + '%';

    var s = '';
    if (stats['2'] > 0) s += '<span class="pstat"><span class="pstat-dot" style="background:var(--s2-color)"></span>' + stats['2'] + ' 2xx</span>';
    if (stats['3'] > 0) s += '<span class="pstat"><span class="pstat-dot" style="background:var(--s3-color)"></span>' + stats['3'] + ' 3xx</span>';
    if (stats['4'] > 0) s += '<span class="pstat"><span class="pstat-dot" style="background:var(--s4-color)"></span>' + stats['4'] + ' 4xx</span>';
    if (stats['5'] > 0) s += '<span class="pstat"><span class="pstat-dot" style="background:var(--s5-color)"></span>' + stats['5'] + ' 5xx</span>';
    if (stats.cors > 0) s += '<span class="pstat"><span class="pstat-dot" style="background:var(--accent)"></span>' + stats.cors + ' CORS</span>';
    if (stats.err  > 0) s += '<span class="pstat"><span class="pstat-dot" style="background:var(--text-muted)"></span>' + stats.err  + ' erro</span>';
    document.getElementById('pStats').innerHTML = s;
  }

  // ── Bulk table ──
  function renderBulkTable() {
    var container = document.getElementById('bulkTableSection');
    if (!container) {
      document.getElementById('bulkResults').insertAdjacentHTML('beforeend',
        '<div class="table-toolbar">' +
          '<div>' +
            '<div class="table-summary" id="tableSummary"></div>' +
            '<div class="filter-chips" id="filterChips"></div>' +
          '</div>' +
          '<div class="toolbar-right">' +
            '<button class="btn-secondary" onclick="exportCsv()" id="exportBtn">Exportar CSV</button>' +
          '</div>' +
        '</div>' +
        '<div id="bulkTableSection"><div class="table-wrap">' +
          '<table id="bulkTable">' +
            '<thead><tr>' +
              '<th onclick="sortBy(\'url\')" id="th-url">URL <span class="sort-arrow">↕</span></th>' +
              '<th onclick="sortBy(\'code\')" id="th-code">Status <span class="sort-arrow">↕</span></th>' +
              '<th id="th-text">Texto</th>' +
              '<th onclick="sortBy(\'elapsed\')" id="th-elapsed">Tempo <span class="sort-arrow">↕</span></th>' +
              '<th id="th-via">Via</th>' +
            '</tr></thead>' +
            '<tbody id="bulkTbody"></tbody>' +
          '</table>' +
        '</div></div>'
      );
    }

    rebuildTableBody();
  }

  function updateTableRow(i) {
    var row = bulkRows[i];
    var tr = document.getElementById('brow-' + i);
    if (!tr) { rebuildTableBody(); return; }
    tr.innerHTML = buildRowCells(row, i);
  }

  function rebuildTableBody() {
    // Apply filter + sort to get display rows
    var displayed = getFilteredSorted();

    var html = '';
    if (displayed.length === 0) {
      // Show pending rows while loading
      for (var i = 0; i < bulkRows.length; i++) {
        html += buildTr(bulkRows[i], i);
      }
    } else {
      for (var j = 0; j < displayed.length; j++) {
        html += buildTr(displayed[j].row, displayed[j].origIdx);
      }
    }
    var tbody = document.getElementById('bulkTbody');
    if (tbody) tbody.innerHTML = html;

    // Update summary
    var done = bulkRows.filter(function(r) { return r.status === 'done'; }).length;
    var total = bulkRows.length;
    var sumEl = document.getElementById('tableSummary');
    if (sumEl) {
      sumEl.innerHTML = '<strong>' + done + '</strong> de <strong>' + total + '</strong> URLs verificadas';
    }

    renderFilterChips();
  }

  function buildTr(row, i) {
    return '<tr id="brow-' + i + '">' + buildRowCells(row, i) + '</tr>';
  }

  function buildRowCells(row, i) {
    if (row.status === 'pending') {
      return '<td class="td-url" colspan="5"><span class="row-spin"></span> ' + esc(row.url) + '</td>';
    }
    var r = row.result;
    if (!r.ok) {
      var errLabel = r.error === 'timeout' ? 'Timeout' : r.error === 'stopped' ? 'Interrompido' : 'Inacessível';
      return '<td class="td-url"><a href="' + esc(row.url) + '" target="_blank">' + esc(row.url) + '</a></td>' +
             '<td class="td-code cm">—</td>' +
             '<td class="td-text" style="color:var(--text-muted)">' + errLabel + '</td>' +
             '<td class="td-time">' + (r.elapsed > 0 ? fmtTime(r.elapsed) : '—') + '</td>' +
             '<td><span class="via-badge via-err">erro</span></td>';
    }
    if (r.mode === 'no-cors') {
      return '<td class="td-url"><a href="' + esc(row.url) + '" target="_blank">' + esc(row.url) + '</a></td>' +
             '<td class="td-code cm">~</td>' +
             '<td class="td-text" style="color:var(--accent-mid)">Acessível (CORS)</td>' +
             '<td class="td-time">' + fmtTime(r.elapsed) + '</td>' +
             '<td><span class="via-badge via-cors">cors</span></td>';
    }
    var c = cls(r.code);
    var label = STATUS[r.code] || '';
    return '<td class="td-url"><a href="' + esc(row.url) + '" target="_blank">' + esc(row.url) + '</a></td>' +
           '<td class="td-code c' + c + '">' + r.code + '</td>' +
           '<td class="td-text">' + esc(label) + '</td>' +
           '<td class="td-time">' + fmtTime(r.elapsed) + '</td>' +
           '<td><span class="via-badge via-direct">direto</span></td>';
  }

  // ── Sort ──
  function sortBy(col) {
    if (sortCol === col) { sortAsc = !sortAsc; } else { sortCol = col; sortAsc = true; }
    document.querySelectorAll('th').forEach(function(th) { th.classList.remove('sorted'); });
    var thEl = document.getElementById('th-' + col);
    if (thEl) {
      thEl.classList.add('sorted');
      var arrow = thEl.querySelector('.sort-arrow');
      if (arrow) arrow.textContent = sortAsc ? '↑' : '↓';
    }
    rebuildTableBody();
  }

  function getFilteredSorted() {
    var indexed = bulkRows.map(function(row, i) { return { row: row, origIdx: i }; });

    // Filter
    indexed = indexed.filter(function(item) {
      var r = item.row.result;
      if (item.row.status === 'pending') return true;
      if (!r.ok)               return activeFilters.err;
      if (r.mode === 'no-cors') return activeFilters.cors;
      return activeFilters[cls(r.code)] !== false;
    });

    // Sort
    if (sortCol) {
      indexed.sort(function(a, b) {
        var ra = a.row.result, rb = b.row.result;
        var va, vb;
        if (sortCol === 'url')     { va = a.row.url; vb = b.row.url; }
        if (sortCol === 'code')    { va = (ra && ra.ok && ra.code) ? ra.code : 0; vb = (rb && rb.ok && rb.code) ? rb.code : 0; }
        if (sortCol === 'elapsed') { va = ra ? ra.elapsed : 0; vb = rb ? rb.elapsed : 0; }
        if (va < vb) return sortAsc ? -1 : 1;
        if (va > vb) return sortAsc ?  1 : -1;
        return 0;
      });
    }

    return indexed;
  }

  // ── Filter chips ──
  function renderFilterChips() {
    var el = document.getElementById('filterChips');
    if (!el) return;
    var counts = { '2':0, '3':0, '4':0, '5':0, cors:0, err:0 };
    bulkRows.forEach(function(row) {
      if (row.status !== 'done' || !row.result) return;
      var r = row.result;
      if (!r.ok)               { counts.err++; return; }
      if (r.mode === 'no-cors') { counts.cors++; return; }
      var c = cls(r.code);
      if (counts[c] !== undefined) counts[c]++;
    });

    var defs = [
      { key:'2',   label:'2xx', color:'var(--s2-color)', bg:'var(--s2-bg)' },
      { key:'3',   label:'3xx', color:'var(--s3-color)', bg:'var(--s3-bg)' },
      { key:'4',   label:'4xx', color:'var(--s4-color)', bg:'var(--s4-bg)' },
      { key:'5',   label:'5xx', color:'var(--s5-color)', bg:'var(--s5-bg)' },
      { key:'cors',label:'CORS',color:'var(--accent-mid)','bg':'var(--accent-light)' },
      { key:'err', label:'Erro',color:'var(--text-muted)', bg:'var(--bg)' },
    ];

    el.innerHTML = defs.filter(function(d) { return counts[d.key] > 0; }).map(function(d) {
      var active = activeFilters[d.key];
      return '<span class="fchip' + (active ? '' : ' inactive') + '" ' +
             'style="background:' + d.bg + ';color:' + d.color + ';border-color:' + d.color + '" ' +
             'onclick="toggleFilter(\'' + d.key + '\')">' +
             d.label + ' · ' + counts[d.key] + '</span>';
    }).join('');
  }

  function toggleFilter(key) {
    activeFilters[key] = !activeFilters[key];
    rebuildTableBody();
  }

  // ── CSV export ──
  function exportCsv() {
    var lines = ['URL,Status,Texto,Tempo (ms),Via'];
    bulkRows.forEach(function(row) {
      var r = row.result;
      if (!r) { lines.push('"' + row.url + '",,Pendente,,'); return; }
      if (!r.ok) { lines.push('"' + row.url + '",,Erro,' + r.elapsed + ','); return; }
      if (r.mode === 'no-cors') { lines.push('"' + row.url + '",~,CORS bloqueado,' + r.elapsed + ',proxy'); return; }
      var label = (STATUS[r.code] || '').replace(/"/g, '""');
      lines.push('"' + row.url + '",' + r.code + ',"' + label + '",' + r.elapsed + ',direto');
    });
    var blob = new Blob([lines.join('\n')], { type: 'text/csv;charset=utf-8;' });
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'http-status-' + new Date().toISOString().slice(0,10) + '.csv';
    a.click();
  }

  // ── Event listeners ──
  document.getElementById('checkBtn').addEventListener('click', runSingle);
  document.getElementById('urlInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') runSingle();
  });
  document.getElementById('bulkBtn').addEventListener('click', runBulk);
  document.querySelectorAll('.chip').forEach(function(chip) {
    chip.addEventListener('click', function() {
      document.getElementById('urlInput').value = chip.dataset.url;
      runSingle();
    });
  });
</script>
</body>
</html>
